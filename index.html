// ─────────────────────────────────────────
function renderRouteList(stops, routeType, arrTimeStr) {
  const ul   = document.getElementById('route-list');
  const body = document.getElementById('route-body');
  ul.innerHTML = '';
  body.style.display = '';

  // 到着希望時刻アラート
  const alertEl = document.getElementById('arrival-alert');
  if (arrTimeStr) {
    const returnEta = stops.at(-1).eta;
    const [ah, am]  = arrTimeStr.split(':').map(Number);
    const desired   = new Date(stops[0].eta);
    desired.setHours(ah, am, 0, 0);
    const diff = Math.round((returnEta - desired) / 60000);

    if (diff > 0) {
      alertEl.innerHTML = `<div class="alert alert-warning">⚠️ 到着希望時刻 ${arrTimeStr} を <strong>${diff}分</strong> 超過する見込みです。</div>`;
    } else {
      alertEl.innerHTML = `<div class="alert alert-success">✅ 到着希望時刻 ${arrTimeStr} より <strong>${Math.abs(diff)}分</strong> 早く帰着できる見込みです。</div>`;
    }
  } else {
    alertEl.innerHTML = '';
  }

  stops.forEach((stop, idx) => {
    // コネクター（移動情報）
    if (idx > 0) {
      let connEl = null;
      if (stop.skipped) {
        connEl = document.createElement('div');
        connEl.className = 'skip-connector';
        connEl.dataset.connDest = idx;
        connEl.innerHTML = `<div class="skip-connector-line"></div><span class="skip-connector-label">↷ 全員欠席のためスキップ</span>`;
      } else if (stop.travelMin) {
        connEl = document.createElement('div');
        connEl.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;padding-left:17px;';
        connEl.dataset.connDest = idx;
        connEl.innerHTML = `
          <div style="display:flex;align-items:center;gap:8px;padding:2px 0;">
            <div style="width:1.5px;min-height:32px;background:var(--gray-200);margin-left:0;"></div>
            <span class="conn-travel-span" style="font-size:12px;color:var(--gray-600);">🚗 移動 ${stop.travelMin}分 / ${stop.dist}</span>
          </div>`;
      }
      if (connEl) ul.appendChild(connEl);
    }

    const li = document.createElement('li');
    li.className = 'route-item';

    let circleClass, circleLabel;
    if (idx === 0) {
      circleClass = 'origin'; circleLabel = '発';
    } else if (idx === stops.length - 1) {
      circleClass = 'dest'; circleLabel = '着';
    } else {
      circleClass = 'child';
      circleLabel = String(idx);  // 通常の数字
    }

    const action   = stop.kind === 'child'
      ? (routeType === 'pickup' ? 'お迎え' : 'お送り') : '';
    const etaLabel = idx === 0 ? '出発' : idx === stops.length - 1 ? '帰着予定' : '到着予定';

    // 指定時刻がある停車地は指定時刻を表示、なければ実際のETA
    const displayTime = (stop.scheduledTime) ? stop.scheduledTime : stop.eta;

    // 待機・遅延バッジ
    let statusBadge = '';
    if (stop.kind === 'child' && stop.waitMin != null && stop.waitMin > 0) {
      if (stop.isDelay) {
        statusBadge = `<div style="color:var(--danger);font-size:11px;font-weight:700;margin-top:3px;">⚠ 遅延 ${stop.waitMin}分</div>`;
      } else {
        statusBadge = `<div style="color:#e65100;font-size:11px;margin-top:3px;">待機 ${stop.waitMin}分</div>`;
      }
    }

    // 同住所の子ども一覧（名前・電話・乗車時間）
    let childrenHtml = '';
    if (stop.kind === 'child' && stop.children?.length) {
      childrenHtml = stop.children.map(c => {
        const phone = c.phone ? `　<span style="color:var(--gray-600);">📞 ${esc(c.phone)}</span>` : '';
        const absKey = `${idx}_${c.name}`;
        const absent = absenceRecords[absKey];
        const absBtnId = `abs-btn-${idx}-${c.name.replace(/[^a-zA-Z0-9]/g,'_')}`;
        const absBtn = `<button class="absence-btn" id="${absBtnId}" onclick="recordAbsence(${idx},'${esc(c.name).replace(/'/g,'&#39;')}')" ${absent ? 'disabled' : ''}>${absent ? '欠席済み' : '欠席'}</button>`;
        const reasonTag = absent ? `<span class="absence-reason-tag">${esc(absent)}</span>` : '';
        return `<div class="child-row ${absent ? 'absent-child' : ''}" data-child-key="${idx}_${c.name}" style="font-size:12px;margin-top:3px;">🧒 <strong>${esc(c.name)}</strong>${reasonTag}${phone}${absBtn}</div>`;
      }).join('');
    }

    const boardLine = stop.kind === 'child' && stop.boardMin != null
      ? `<div style="font-size:12px;color:var(--gray-600);margin-top:2px;">🕐 停車 ${stop.boardMin}分</div>` : '';

    const isLastStop = idx === stops.length - 1;
    const btnLabel   = isLastStop ? '到着' : '出発';
    const btnArrival = isLastStop ? 'data-is-arrival="1"' : '';

    if (stop.skipped) li.classList.add('all-absent-stop');
    li.dataset.stopIdx = idx;
    li.innerHTML = `
      <div class="stop-circle ${circleClass}">${circleLabel}</div>
      <div class="stop-info">
        <div class="stop-name">
          ${action ? `<span style="font-size:11px;font-weight:700;color:var(--success);background:#e6f4ea;padding:1px 7px;border-radius:10px;margin-right:6px;">${action}</span>` : ''}${esc(stop.label)}
        </div>
        <div class="stop-sub">📍 ${esc(stop.address)}</div>
        ${boardLine}
        ${childrenHtml}
      </div>
      <div class="right-col">
        <div class="stop-time">
          <div class="time-eta ${stop.isDelay ? 'over-time' : ''}">${displayTime ? fmt(displayTime) : '---'}</div>
          <div class="time-label">${etaLabel}</div>
          ${statusBadge}
        </div>
        <div class="depart-col no-print">
          <button class="depart-btn" ${btnArrival} onclick="recordDeparture(${idx})">${btnLabel}</button>
          <span class="depart-time-sub"></span>
        </div>
      </div>`;
    ul.appendChild(li);
  });
}

function fmt(date) {
  return date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

// GASから復元したルートの地図を再描画
async function redrawMapRoute(stops) {
  if (!stops || stops.length < 2) return;
  try {
    if (!mapsReady) {
      const key = document.getElementById('maps-key').value.trim();
      if (!key) return;
      await loadMapsAPI(key);
    }
    ensureMap();
    const activeStops = stops.filter(s => !s.skipped);
    const origin      = activeStops[0].address;
    const destination = activeStops[activeStops.length - 1].address;
    const waypoints   = activeStops.slice(1, -1).map(s => ({ location: s.address, stopover: true }));
    const svc = new google.maps.DirectionsService();
    const result = await new Promise((resolve, reject) => {
      svc.route({
        origin, destination, waypoints,
        travelMode: google.maps.TravelMode.DRIVING,
        optimizeWaypoints: false,
      }, (res, status) => status === 'OK' ? resolve(res) : reject(status));
    });
    gRenderer.setMap(gMap);
    gRenderer.setDirections(result);
    gDirectionsResult = result;
    // 番号マーカーを再描画（確定後も同様に表示）
    clearCustomMarkers();
    const legs = result.routes[0].legs;
    // 発マーカー（緑）・着マーカー（赤）を別変数で管理
    gDepartureMarker = new google.maps.Marker({
      position: legs[0].start_location,
      map:      gMap,
      icon:     makeCircleIcon('#34a853', 18),
      label:    { text: '発', color: '#ffffff', fontWeight: 'bold', fontSize: '14px' },
      title:    activeStops[0].label || activeStops[0].address,
      zIndex:   300,
    });
    // 経由地マーカー（青・元の停車番号）
    const waypointCount = legs.length - 1;
    for (let i = 0; i < waypointCount; i++) {
      const origIdx = stops.indexOf(activeStops[i + 1]);
      gMarkers.push(new google.maps.Marker({
        position: legs[i].end_location,
        map:      gMap,
        icon:     makeCircleIcon('#1a73e8', 16),
        label:    { text: String(origIdx), color: '#ffffff', fontWeight: 'bold', fontSize: '14px' },
        title:    activeStops[i + 1]?.label || activeStops[i + 1]?.address || String(origIdx),
        zIndex:   100 + i,
      }));
    }
    // 着マーカー（赤）
    gArrivalMarker = new google.maps.Marker({
      position: legs[legs.length - 1].end_location,
      map:      gMap,
      icon:     makeCircleIcon('#ea4335', 18),
      label:    { text: '着', color: '#ffffff', fontWeight: 'bold', fontSize: '14px' },
      title:    activeStops[activeStops.length - 1].label || activeStops[activeStops.length - 1].address,
      zIndex:   300,
    });
    updateDepartureArrivalMarkers();
    // スマホ等でマップが正しくレンダリングされるようリサイズをトリガー
    setTimeout(() => {
      google.maps.event.trigger(gMap, 'resize');
      const bounds = new google.maps.LatLngBounds();
      legs.forEach(leg => {
        bounds.extend(leg.start_location);
        bounds.extend(leg.end_location);
      });
      if (!bounds.isEmpty()) gMap.fitBounds(bounds, 30);
    }, 300);
    // 既に通過済み区間があればグレー描画
    updateCompletedRouteOverlay();
  } catch (e) {
    console.warn('[地図再描画] エラー:', e);
  }
}

// ─────────────────────────────────────────
function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getSelectedDate() {
  const el = document.getElementById('route-date');
  return (el && el.value) ? el.value : getToday();
}

async function recordDeparture(stopIdx) {
  const hhmm  = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  const today = getSelectedDate();
  departureRecords[stopIdx] = hhmm;
  localDeparted.add(stopIdx);
  applyDepartureState();
  // 帰着ボタン（最終停留所）なら車内確認バナーを表示
  const allIdx = Array.from(document.querySelectorAll('.route-item[data-stop-idx]')).map(li => parseInt(li.dataset.stopIdx));
  const lastIdx = allIdx.length > 0 ? Math.max(...allIdx) : -1;
  if (stopIdx === lastIdx) showArrivalCheckBanner();
  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors',
      body: JSON.stringify({ date: today, stopNum: stopIdx, departTime: hhmm }) });
    console.log('[出発記録] POST完了 stopIdx:', stopIdx, hhmm);
  } catch (err) {
    console.error('[出発記録] POST失敗:', err);
  }
}

async function syncOperation() {
  const today = getSelectedDate();
  try {
    const url = `${GAS_URL}?date=${today}`;
    console.log('[同期] GETリクエスト:', url);
    const res = await fetch(url);
    if (!res.ok) { console.error('[同期] GETエラー:', res.status); return; }
    const records = await res.json();
    console.log('[同期] GETレスポンス:', JSON.stringify(records));
    if (!Array.isArray(records)) return;

    // 出発記録（stopNum >= 0 のみ）を適用
    // GASからの復元時も localDeparted に追加して出発済み状態を正しく復元
    records.filter(r => Number(r.stopNum) >= 0).forEach(r => {
      const idx = Number(r.stopNum);
      departureRecords[idx] = r.departTime;
      localDeparted.add(idx);
    });

    // 帰着確定状態を同期
    const finalRecs = records.filter(r => [-666, -665].includes(Number(r.stopNum)));
    if (finalRecs.length > 0) {
      const lastFinal = finalRecs[finalRecs.length - 1];
      isFinalized = Number(lastFinal.stopNum) === -666;
      if (isFinalized) document.body.classList.add('finalized');
      else document.body.classList.remove('finalized');
    }

    // 欠席記録を同期
    records.filter(r => Number(r.stopNum) === -777).forEach(r => {
      try {
        const d = JSON.parse(r.departTime);
        if (d.personName !== undefined && d.stopIdx !== undefined) {
          absenceRecords[`${d.stopIdx}_${d.personName}`] = d.reason || 'その他';
        }
      } catch(e) {}
    });
    // 欠席確認済み記録を同期 (-776)
    records.filter(r => Number(r.stopNum) === -776).forEach(r => {
      try {
        const d = JSON.parse(r.departTime);
        if (d.personName !== undefined && d.stopIdx !== undefined) {
          const key = `${d.stopIdx}_${d.personName}`;
          acknowledgedAbsences.add(key);
          dismissedAbsences.add(key); // バナーを再表示しない
        }
      } catch(e) {}
    });
    applyAbsenceState();
    updateAbsenceBanner(); updateAbsenceAlertBar();
    reoptimizeAfterAbsence();

    // スナップショット行（stopNum === -999）からルートを復元
    if (!gCurrentStops) {
      const snaps = records.filter(r => Number(r.stopNum) === -999);
      if (snaps.length > 0) {
        try {
          const data = JSON.parse(snaps[snaps.length - 1].departTime);
          gCurrentStops      = deserializeStops(data.stops);
          gCurrentRouteType  = data.routeType;
          gCurrentArrTimeStr = data.arrTimeStr;
          // 確定済み(-888)の場合のみ card-result を表示。未確定はホーム画面のまま
          if (isShared) {
            document.getElementById('card-result').style.display = '';
            renderRouteList(gCurrentStops, gCurrentRouteType, gCurrentArrTimeStr);
            updateModeUI();
            redrawMapRoute(gCurrentStops);
            toast('📡 運行中のルートを自動表示しています', 'info');
          }
          if (!syncTimerId) syncTimerId = setInterval(syncOperation, 30000);
        } catch (e) { console.warn('[同期] スナップショット復元失敗:', e); }
      }
    }

    applyDepartureState();
    const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const el = document.getElementById('sync-status');
    if (el) { el.textContent = `🔄 最終更新：${now}`; el.style.display = ''; }
  } catch (err) {
    console.error('[同期] エラー:', err);
  }
}

// 通過済み区間を地図上でグレー表示
function updateCompletedRouteOverlay() {
  if (gGreyPolyline) { gGreyPolyline.setMap(null); gGreyPolyline = null; }
  if (!gDirectionsResult || !gCurrentStops || !gMap) return;

  const departedKeys = Object.keys(departureRecords).map(Number);
  if (!departedKeys.length) return;
  const lastDeparted = Math.max(...departedKeys);

  // DirectionsResult のレッグに対応するアクティブ停車地（スキップしない地点）
  const activeStops = gCurrentStops.filter(s => !s.skipped);
  const departedStop = gCurrentStops[lastDeparted];
  const departedActiveIdx = activeStops.indexOf(departedStop);
  if (departedActiveIdx < 1) return;

  // legs[0..departedActiveIdx-1] のパスを結合してグレーポリラインを描画
  const path = [];
  const legs = gDirectionsResult.routes[0]?.legs;
  if (!legs) return;
  for (let i = 0; i < departedActiveIdx && i < legs.length; i++) {
    legs[i].steps.forEach(step => {
      (step.path || [step.start_location, step.end_location]).forEach(pt => path.push(pt));
    });
  }
  if (path.length < 2) return;

  gGreyPolyline = new google.maps.Polyline({
    path,
    map:            gMap,
    strokeColor:    '#9e9e9e',
    strokeWeight:   5,
    strokeOpacity:  0.85,
    zIndex:         20,
  });
}

function applyDepartureState() {
  const items = document.querySelectorAll('.route-item[data-stop-idx]');
  const allIdx = Array.from(items).map(li => parseInt(li.dataset.stopIdx));
  const lastIdx = allIdx.length > 0 ? Math.max(...allIdx) : -1;

  const departedSet = new Set(Object.keys(departureRecords).map(Number));

  // センター停留所はローカル押下のみ「出発済み」扱い（GASロード分は除外）
  const effectiveDeparted = new Set(
    [...departedSet].filter(idx => idx !== 0 && idx !== lastIdx || localDeparted.has(idx))
  );

  // 出発済み最大インデックス（effectiveDeparted 基準）
  const effKeys = [...effectiveDeparted];
  const maxDeparted = effKeys.length ? Math.max(...effKeys) : -1;

  // 順序制御: effectiveDeparted で未出発・スキップなしの中で最小インデックス
  const orderedIdx = allIdx.slice().sort((a, b) => a - b);
  const nextExpected = orderedIdx.find(i => {
    if (effectiveDeparted.has(i)) return false;
    const el = document.querySelector(`.route-item[data-stop-idx="${i}"]`);
    return !el?.classList.contains('all-absent-stop');
  });

  items.forEach(li => {
    const idx = parseInt(li.dataset.stopIdx);
    const btn = li.querySelector('.depart-btn');
    const sub = li.querySelector('.depart-time-sub');
    const isCenterStop = (idx === 0 || idx === lastIdx);

    // ─── グレー化（中間停留所のみ）───
    if (!isCenterStop) {
      if (maxDeparted >= 0 && idx <= maxDeparted) {
        li.classList.add('departed');
        li.querySelectorAll('.absence-btn:not(:disabled)').forEach(ab => {
          ab.disabled = true; ab.style.pointerEvents = 'none';
        });
      } else {
        li.classList.remove('departed');
      }
    }

    if (effectiveDeparted.has(idx)) {
      // ─── 出発済み ───
      const isArrival = btn?.dataset.isArrival === '1';
      const doneLabel = isArrival ? '✅ 到着済み' : '✅ 出発済み';
      const t = String(departureRecords[idx] ?? '');
      const hhmm = /^\d{1,2}:\d{2}$/.test(t) ? t : '';
      if (btn) {
        btn.disabled = true;
        btn.style.display = '';
        btn.textContent = hhmm ? `${doneLabel} ${hhmm}` : doneLabel;
      }
      if (sub) {
        sub.textContent = (isKirariMode && hhmm) ? `${doneLabel} ${hhmm}` : '';
        if (isKirariMode && hhmm) {
          sub.style.fontSize  = '12px';
          sub.style.color     = 'var(--success)';
          sub.style.fontWeight = '700';
        }
      }
    } else if (isCenterStop) {
      // ─── センター停留所：未押下 → 常に有効表示 ───
      if (btn) {
        btn.disabled = false;
        btn.style.display = '';
        btn.textContent = btn.dataset.isArrival === '1' ? '到着' : '出発';
      }
      if (sub) sub.textContent = '';
    } else if (btn) {
      // ─── 中間停留所：次の地点のみ表示、それ以外は非表示 ───
      const isSkipped = li.classList.contains('all-absent-stop');
      const isNext = !isSkipped && (nextExpected === undefined || idx === nextExpected);
      btn.disabled = !isNext;
      btn.style.display = isNext ? '' : 'none';
      if (sub) sub.textContent = '';
    }
  });
  updateFinalizeButton();
  updateCompletedRouteOverlay();

  // ─── 現在移動中区間の点滅 ───
  // departureRecords の最大インデックスを基準にすることで
  // effectiveDeparted の計算誤差に依存しない正確な判定を実現
  document.querySelectorAll('.conn-travel-span').forEach(el => el.classList.remove('moving-now'));
  const departedNums = Object.keys(departureRecords).map(Number);
  const lastDepartedIdx = departedNums.length > 0 ? Math.max(...departedNums) : -1;
  if (lastDepartedIdx >= 0 && lastDepartedIdx !== lastIdx) {
    const conn = document.querySelector(`[data-conn-dest="${lastDepartedIdx + 1}"]`);
    const span = conn?.querySelector('.conn-travel-span');
    if (span) span.classList.add('moving-now');
  }

  updateDepartureArrivalMarkers();
}

function startOperationSync() {
  departureRecords = {};

  if (syncTimerId) clearInterval(syncTimerId);
  syncOperation(); // 初回即時

}

// stops を JSON 保存用にシリアライズ
function serializeStops(stops) {
  return stops.map(s => ({
    label:     s.label,
    address:   s.address,
    kind:      s.kind,
    eta:       s.eta ? s.eta.getTime() : null,
    scheduledTime: s.scheduledTime ? s.scheduledTime.getTime() : null,
    travelMin: s.travelMin  ?? null,
    dist:      s.dist       ?? null,
    waitMin:   s.waitMin    ?? null,
    isDelay:   s.isDelay    || false,
    boardMin:  s.boardMin   ?? null,
    skipped:   s.skipped    || false,
    children:  (s.children  || []).map(c => ({ name: c.name, phone: c.phone || '' }))
  }));
}

// シリアライズ済み stops を Date オブジェクト付きで復元
function deserializeStops(data) {
  return data.map(s => ({
    ...s,
    eta:           s.eta != null ? new Date(s.eta) : null,
    scheduledTime: s.scheduledTime ? new Date(s.scheduledTime) : null
  }));
}

    departTime: JSON.stringify({ routeType, arrTimeStr, stops: serializeStops(stops) })
  });
  console.log('[スナップショット] POST送信 stops数:', stops.length);
  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: payload });
    console.log('[スナップショット] POST完了');

}

// 全員欠席になった地点をスキップしてルートを再計算
async function reoptimizeAfterAbsence() {
  if (!gCurrentStops) return;

  const departedKeys = Object.keys(departureRecords).map(Number);
  const lastDeparted = departedKeys.length > 0 ? Math.max(...departedKeys) : -1;

  // ① 新たに全員欠席になった未通過・未スキップ地点にスキップフラグを立てる
  let anyNew = false;
  gCurrentStops.forEach((stop, idx) => {
    if (stop.kind !== 'child' || idx <= lastDeparted || stop.skipped) return;
    if (stop.children?.every(c => absenceRecords[`${idx}_${c.name}`])) {
      stop.skipped   = true;
      stop.travelMin = null;
      stop.dist      = '';
      stop.eta       = null;
      anyNew = true;
    }
  });
  if (!anyNew) return;

  // ② ルートリストを先に更新（地図なしでも反映）
  renderRouteList(gCurrentStops, gCurrentRouteType, gCurrentArrTimeStr);
  applyDepartureState();
  applyAbsenceState();

  // ③ Maps API 未準備ならリスト更新と GAS 保存のみ
  if (!mapsReady || !window.google?.maps?.DirectionsService) {
    await _saveReoptimizedRoute();
    return;
  }

  if (!gMap || !gRenderer) ensureMap();

  // ④ スキップを除いた有効停車地（redrawMapRoute と同じフィルタ）
  const activeStops = gCurrentStops.filter(s => !s.skipped);
  if (activeStops.length < 2) {
    await _saveReoptimizedRoute();
    return;
  }

  toast('欠席により経路を再計算中...', 'info');
  try {
    const origin      = activeStops[0].address;
    const destination = activeStops[activeStops.length - 1].address;
    const waypoints   = activeStops.slice(1, -1).map(s => ({ location: s.address, stopover: true }));

    const svc = new google.maps.DirectionsService();
    const result = await new Promise((resolve, reject) => {
      svc.route({
        origin, destination, waypoints,
        travelMode: google.maps.TravelMode.DRIVING,
        optimizeWaypoints: false,
        region: 'JP',
      }, (res, status) => status === 'OK' ? resolve(res) : reject(new Error(status)));
    });

    const legs = result.routes[0].legs;

    // ⑤ activeStops の ETA と移動時間を更新
    let cur = activeStops[0].eta ? new Date(activeStops[0].eta) : new Date();
    for (let i = 1; i < activeStops.length; i++) {
      const leg       = legs[i - 1];
      const travelSec = leg.duration_in_traffic?.value ?? leg.duration.value;
      cur = new Date(cur.getTime() + travelSec * 1000);
      activeStops[i].travelMin = Math.ceil(travelSec / 60);
      activeStops[i].dist      = leg.distance.text;
      activeStops[i].eta       = new Date(cur);
      if (activeStops[i].kind === 'child' && activeStops[i].boardMin != null) {
        cur = new Date(cur.getTime() + activeStops[i].boardMin * 60 * 1000);
      }
    }

    // ⑥ 地図を更新
    gRenderer.setMap(gMap);
    gRenderer.setDirections(result);
    gDirectionsResult = result;
    clearCustomMarkers();

    gDepartureMarker = new google.maps.Marker({
      position: legs[0].start_location, map: gMap,
      icon: makeCircleIcon('#34a853', 18),
      label: { text: '発', color: '#fff', fontWeight: 'bold', fontSize: '14px' },
      title: activeStops[0].label, zIndex: 300,
    });
    for (let i = 0; i < legs.length - 1; i++) {
      const origIdx = gCurrentStops.indexOf(activeStops[i + 1]);
      gMarkers.push(new google.maps.Marker({
        position: legs[i].end_location, map: gMap,
        icon: makeCircleIcon('#1a73e8', 16),
        label: { text: String(origIdx), color: '#fff', fontWeight: 'bold', fontSize: '14px' },
        title: activeStops[i + 1].label, zIndex: 100 + i,
      }));
    }
    gArrivalMarker = new google.maps.Marker({
      position: legs[legs.length - 1].end_location, map: gMap,
      icon: makeCircleIcon('#ea4335', 18),
      label: { text: '着', color: '#fff', fontWeight: 'bold', fontSize: '14px' },
      title: activeStops[activeStops.length - 1].label, zIndex: 300,
    });
    updateDepartureArrivalMarkers();
    setTimeout(() => {
      google.maps.event.trigger(gMap, 'resize');
      const b = new google.maps.LatLngBounds();
      legs.forEach(leg => { b.extend(leg.start_location); b.extend(leg.end_location); });
      if (!b.isEmpty()) gMap.fitBounds(b, 30);
    }, 300);

    renderRouteList(gCurrentStops, gCurrentRouteType, gCurrentArrTimeStr);
    applyDepartureState();
    applyAbsenceState();
    updateCompletedRouteOverlay();

    await _saveReoptimizedRoute();
    toast('経路を再最適化しました', 'success');
  } catch (e) {
    console.error('[経路再最適化] エラー:', e);
    toast('経路の再計算に失敗しました: ' + e.message, 'error');
  }
}

async function _saveReoptimizedRoute() {
  saveRouteSnapshot(gCurrentStops, gCurrentRouteType, gCurrentArrTimeStr);
  if (!isShared) return;
  const payload = JSON.stringify({
    date: getSelectedDate(),
    stopNum: -888,
    departTime: JSON.stringify({
      routeType:  gCurrentRouteType,
      arrTimeStr: gCurrentArrTimeStr,
      stops:      serializeStops(gCurrentStops),
    })
  });
  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: payload });
  } catch (e) { console.warn('[再最適化保存] エラー:', e); }
}

// 欠席状態をUIに反映
function applyAbsenceState() {
  if (!gCurrentStops) return;
  document.querySelectorAll('.route-item').forEach(li => {
    const idx = parseInt(li.dataset.stopIdx);
    if (isNaN(idx)) return;
    const stop = gCurrentStops[idx];
    if (!stop?.children) return;
    stop.children.forEach(c => {
      const key = `${idx}_${c.name}`;
      const row = li.querySelector(`.child-row[data-child-key="${key}"]`);
      if (!row) return;
      const btn = row.querySelector('.absence-btn');
      const reason = absenceRecords[key];
      if (reason) {
        row.classList.add('absent-child');
        if (btn) { btn.disabled = true; btn.textContent = '欠席済み'; }
        let tag = row.querySelector('.absence-reason-tag');
        if (!tag) {
          tag = document.createElement('span');
          tag.className = 'absence-reason-tag';
          const nameEl = row.querySelector('strong');
          if (nameEl) nameEl.after(tag);
        }
        tag.textContent = reason;
        // 添乗者が確認済みの場合「確認済み」バッジを表示（きらりモードで通知）
        let ackTag = row.querySelector('.absence-ack-tag');
        if (acknowledgedAbsences.has(key)) {
          if (!ackTag) {
            ackTag = document.createElement('span');
            ackTag.className = 'absence-ack-tag';
            tag.after(ackTag);
          }
          ackTag.textContent = '✅ 確認済み';
        } else if (ackTag) {
          ackTag.remove();
        }
      }
    });
    // 全員欠席なら停車地全体を薄く（children が空の場合は対象外）
    const allAbsent = stop.children.length > 0 && stop.children.every(c => absenceRecords[`${idx}_${c.name}`]);
    if (allAbsent) li.classList.add('all-absent-stop');
    else li.classList.remove('all-absent-stop');
  });
}

// 欠席通知バナー更新（添乗者モード用）
function updateAbsenceBanner() {
  const banner = document.getElementById('absence-banner');
  if (!banner) return;
  const keys = Object.keys(absenceRecords);
  if (isKirariMode || !keys.length) { banner.style.display = 'none'; return; }
  const items = keys.map(key => {
    const sep = key.indexOf('_');
    const stopIdx = parseInt(key.substring(0, sep));
    const name = key.substring(sep + 1);
    const stop = gCurrentStops?.[stopIdx];
    const reason = absenceRecords[key];
    return `${name}（${stop?.label || `停車${stopIdx}`}・${reason}）`;
  });
  banner.innerHTML = `⚠️ 欠席：${items.join('・')}`;
  banner.style.display = '';
}

// 固定欠席通知バー（添乗者モードのみ・×で個別に閉じるまで常時表示）
function updateAbsenceAlertBar() {
  const bar = document.getElementById('absence-alert-bar');
  if (!bar) return;

  // きらりモード：確認済み（添乗者が×を押した）をまだ閉じていないものを緑バナーで表示
  if (isKirariMode) {
    const unread = [...acknowledgedAbsences].filter(key => !kirariDismissedAck.has(key));
    if (!unread.length) { bar.innerHTML = ''; _positionAbsenceAlertBar(); return; }
    bar.innerHTML = unread.map(key => {
      const name = key.substring(key.indexOf('_') + 1);
      return `<div class="absence-ack-item">
        <span>✅ ${esc(name)}様の欠席連絡を確認しました</span>
        <button class="absence-alert-close" data-key="${esc(key)}" aria-label="閉じる">×</button>
      </div>`;
    }).join('');
    bar.querySelectorAll('.absence-alert-close').forEach(btn => {
      btn.addEventListener('click', () => {
        kirariDismissedAck.add(btn.dataset.key);
        try { sessionStorage.setItem('kirariDismissedAck', JSON.stringify([...kirariDismissedAck])); } catch(e) {}
        updateAbsenceAlertBar();
      });
    });
    _positionAbsenceAlertBar();
    return;
  }

  const undismissed = Object.entries(absenceRecords)
    .filter(([key]) => !dismissedAbsences.has(key));

  if (!undismissed.length) { bar.innerHTML = ''; _positionAbsenceAlertBar(); return; }

  bar.innerHTML = undismissed.map(([key, reason]) => {
    const sep  = key.indexOf('_');
    const name = key.substring(sep + 1);
    return `<div class="absence-alert-item">
      <span>🔔 ${esc(name)}様の欠席連絡が入りました（${esc(reason)}）</span>
      <button class="absence-alert-close" data-key="${esc(key)}" aria-label="閉じる">×</button>
    </div>`;
  }).join('');

  bar.querySelectorAll('.absence-alert-close').forEach(btn => {
    btn.addEventListener('click', async () => {
      const key = btn.dataset.key;
      dismissedAbsences.add(key);
      updateAbsenceAlertBar();
      // GAS に確認済み記録 (-776) を保存 → きらりモードへ通知
      const sep = key.indexOf('_');
      const stopIdx    = parseInt(key.substring(0, sep));
      const personName = key.substring(sep + 1);
      try {
        await fetch(GAS_URL, {
          method: 'POST', mode: 'no-cors',
          body: JSON.stringify({ date: getSelectedDate(), stopNum: -776,
            departTime: JSON.stringify({ stopIdx, personName }) })
        });
      } catch(e) { console.warn('欠席確認送信失敗:', e); }
    });
  });

  _positionAbsenceAlertBar();
}

function _positionAbsenceAlertBar() {
  const bar    = document.getElementById('absence-alert-bar');
  const header = document.querySelector('.app-header');
  if (bar && header) {
    bar.style.top = header.getBoundingClientRect().bottom + 'px';
  }
}

window.addEventListener('resize', _positionAbsenceAlertBar);

async function checkConfirmedRoute(dateStr, timeoutMs = 5000) {
  const today = dateStr || getSelectedDate();
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
    let res;
    try {
      res = await fetch(`${GAS_URL}?date=${today}&confirmed=true`, { signal: controller.signal });
    } finally {
      clearTimeout(timeoutId);
    }
    if (!res.ok) return false;
    const records = await res.json();
    console.log('[確定ルート確認] date:', today, 'records:', records);
    if (!Array.isArray(records) || !records.length) return false;

    // GASからstringで返ってくる場合も考慮してNumber()で統一
    const rec = records.find(r => Number(r.stopNum) === -888);
    if (!rec) return false;

    const data = JSON.parse(rec.departTime);
    gCurrentStops      = deserializeStops(data.stops);
    gCurrentRouteType  = data.routeType;
    gCurrentArrTimeStr = data.arrTimeStr;

    // 共有済み
    isShared = true;
    document.body.classList.remove('not-shared');

    // 確定状態（帰着確定/解除）を判定
    const finalRecs = records.filter(r => [-666, -665].includes(Number(r.stopNum)));
    if (finalRecs.length > 0) {
      const lastFinal = finalRecs[finalRecs.length - 1];
      isFinalized = Number(lastFinal.stopNum) === -666;
    } else {
      isFinalized = false;
    }
    if (isFinalized) document.body.classList.add('finalized');
    else document.body.classList.remove('finalized');

    // 出発記録・欠席記録・確認済みを同じレスポンスから即時反映（別途syncOperation不要）
    // GASからの復元時も localDeparted に追加して出発済み状態を正しく復元
    records.filter(r => Number(r.stopNum) >= 0).forEach(r => {
      const idx = Number(r.stopNum);
      departureRecords[idx] = r.departTime;
      localDeparted.add(idx);
    });
    records.filter(r => Number(r.stopNum) === -777).forEach(r => {
      try {
        const d = JSON.parse(r.departTime);
        if (d.personName !== undefined && d.stopIdx !== undefined) {
          absenceRecords[`${d.stopIdx}_${d.personName}`] = d.reason || 'その他';
        }
      } catch(e) {}
    });
    records.filter(r => Number(r.stopNum) === -776).forEach(r => {
      try {
        const d = JSON.parse(r.departTime);
        if (d.personName !== undefined && d.stopIdx !== undefined) {
          const key = `${d.stopIdx}_${d.personName}`;
          acknowledgedAbsences.add(key);
          dismissedAbsences.add(key); // バナーを再表示しない
        }
      } catch(e) {}
    });

    document.getElementById('card-result').style.display = '';
    renderRouteList(gCurrentStops, gCurrentRouteType, gCurrentArrTimeStr);
    updateConfirmButton(true);
    updateModeUI();
    applyDepartureState();
    applyAbsenceState();
    updateAbsenceBanner(); updateAbsenceAlertBar();
    redrawMapRoute(gCurrentStops);

    if (!syncTimerId) {
      syncTimerId = setInterval(syncOperation, 30000);
    }
    toast('📋 確定済みルートを表示しています', 'info');
    return true;
  } catch (err) {
    if (err.name === 'AbortError') {
      console.warn('[確定ルート確認] タイムアウト（5秒）');
    } else {
      console.warn('[確定ルート確認] エラー:', err);
    }
    return false;
  }
}

// 日付変更時：GAS に確定ルートを問い合わせてSTEP1のステータスに結果を表示
async function checkAndShowConfirmedRoute(dateStr) {
  const statusEl = document.getElementById('date-confirm-status');
  if (!statusEl) return;

  statusEl.style.display = '';
  statusEl.style.background = '#e3f2fd';
  statusEl.style.color = '#0d47a1';
  statusEl.style.borderColor = '#90caf9';
  statusEl.innerHTML = '<span class="spinner" style="border-color:rgba(13,71,161,.2);border-top-color:#0d47a1;vertical-align:middle;margin-right:6px;"></span>📡 運行データを確認中...';

  // 既存のルート状態をリセット
  gCurrentStops = null;
  gCurrentRouteType = null;
  gCurrentArrTimeStr = null;
  departureRecords = {};
  localDeparted = new Set();
  if (gGreyPolyline) { gGreyPolyline.setMap(null); gGreyPolyline = null; }
  gDirectionsResult = null;
  if (syncTimerId) { clearInterval(syncTimerId); syncTimerId = null; }

  const found = await checkConfirmedRoute(dateStr);
  if (found) {
    if (isFinalized) {
      statusEl.style.background = '#e8f5e9';
      statusEl.style.color = '#1b5e20';
      statusEl.style.borderColor = '#a5d6a7';
      statusEl.textContent = '🏁 帰着確定済み（本日の運行が完了しています）';
    } else {
      statusEl.style.background = '#f1f8e9';
      statusEl.style.color = '#33691e';
      statusEl.style.borderColor = '#aed581';
      statusEl.textContent = '✅ 共有中のルートを表示しています';
    }
  } else {
    // 未共有：ルート表示をクリアしてSTEP1のみ
    document.getElementById('card-result').style.display = 'none';
    statusEl.style.background = '#fff8e1';
    statusEl.style.color = '#e65100';
    statusEl.style.borderColor = '#ffcc02';
    statusEl.textContent = 'まだルートが確定されていません';
  }
}

// "HH:MM" 文字列を dateRef と同日の Date に変換
// 全角コロン「：」・全角数字も受け付ける（NFKC正規化）
function parseStopTime(timeStr, dateRef) {
  if (!timeStr) return null;
  const s = timeStr.normalize('NFKC').trim();
  const m = s.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const d = new Date(dateRef);
  d.setHours(parseInt(m[1]), parseInt(m[2]), 0, 0);
  return d;
}

// ─────────────────────────────────────────
//  推奨出発時刻の計算
// ─────────────────────────────────────────
async function calcRecommendedDeparture() {
  const center = document.getElementById('center-addr').value.trim();
  if (!center) { toast('事業所住所が未入力です', 'warning'); return; }
  if (!mapsReady) { toast('Google Maps APIが未準備です', 'warning'); return; }

  const present = children.filter(c => c.present);
  if (!present.length) { toast('出席者が0名です', 'warning'); return; }

  const groups = buildAddressGroups(present);

  // G列(stopTime)が設定されている最初のグループを探す
  const firstGroup = groups.find(g => g.stopTime);
  if (!firstGroup) {
    document.getElementById('depart-recommend').innerHTML =
      '<div style="font-size:13px;color:var(--gray-500);margin-top:6px;">指定到着時刻(G列)が設定された停車地がないため計算できません。</div>';
    return;
  }

  const bufferMin = parseInt(document.getElementById('recommend-buffer').value) || 3;
  const dateStr   = document.getElementById('route-date').value
                  || new Date().toISOString().slice(0, 10);

  // stopTime を Date 化（NFKC正規化済み）
  const scheduled = parseStopTime(firstGroup.stopTime, dateStr + 'T00:00:00');
  if (!scheduled) { toast('指定到着時刻の形式が無効です', 'warning'); return; }

  const recEl = document.getElementById('depart-recommend');
  recEl.innerHTML = '<div style="font-size:13px;color:var(--gray-500);margin-top:6px;">移動時間を計算中…</div>';
  setLoading('recommend-btn', true, '計算中…');

  try {
    const ds = new google.maps.DirectionsService();
    const result = await new Promise((resolve, reject) => {
      ds.route({
        origin:      normalizeAddressForGeocode(center),
        destination: normalizeAddressForGeocode(firstGroup.address),
        travelMode:  google.maps.TravelMode.DRIVING,
      }, (res, status) => {
        if (status === 'OK') resolve(res);
        else reject(Object.assign(new Error('Directions: ' + status), { apiStatus: status }));
      });
    });

    const travelSec = result.routes[0].legs[0].duration.value;
    const travelMin = Math.ceil(travelSec / 60);

    // 推奨出発時刻 = 指定時刻 - 移動時間 - 余裕時間
    const recDate = new Date(scheduled.getTime() - (travelSec + bufferMin * 60) * 1000);
    const recStr  = recDate.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });

    const stopLabel  = firstGroup.stopName || firstGroup.children.map(c => c.name).join('・');
    const groupIdx   = groups.indexOf(firstGroup);
    const circled    = String(groupIdx + 1);
    const schDisplay = firstGroup.stopTime.normalize('NFKC').trim().slice(0, 5);

    recEl.innerHTML = `
      <div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;
                  padding:8px 12px;margin-top:4px;display:flex;align-items:center;
                  gap:10px;flex-wrap:wrap;">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-size:11px;color:#388e3c;font-weight:600;">💡 推奨</span>
          <span style="font-size:22px;font-weight:bold;color:#1b5e20;line-height:1;">${recStr}</span>
        </div>
        <div style="font-size:11px;color:#2e7d32;flex:1;min-width:120px;">
          ${circled}${esc(stopLabel)} <strong>${schDisplay}</strong>指定
          （移動${travelMin}分＋余裕${bufferMin}分）
        </div>
        <button class="btn btn-success btn-sm"
                onclick="adoptRecommendedDeparture('${recStr}')">
          ✅ この時刻を採用
        </button>
      </div>`;

  } catch (e) {
    recEl.innerHTML = `<div style="font-size:13px;color:var(--danger);margin-top:6px;">移動時間の取得に失敗しました（${esc(e.message)}）</div>`;
  } finally {
    setLoading('recommend-btn', false, '⏱ 推奨出発時刻を計算');
  }
}

function adoptRecommendedDeparture(timeStr) {
  adoptedDepartureTime = timeStr;  // 変数に保存（最適化時に使用）
  const input = document.getElementById('depart-time');
  input.value = timeStr;
  // 採用したことを視覚的にフィードバック
  input.style.transition = 'background-color 0.15s';
  input.style.backgroundColor = '#c8e6c9';
  setTimeout(() => { input.style.backgroundColor = ''; }, 1200);
}

// ─────────────────────────────────────────
//  印刷：停車数に応じた自動スケール調整
// ─────────────────────────────────────────
window.addEventListener('beforeprint', onBeforePrint);
window.addEventListener('afterprint',  onAfterPrint);

function onBeforePrint() {
  const section = document.getElementById('print-section');
  if (!section || !section.innerHTML.trim()) return;

  // display:none の要素は offsetHeight=0 のため、一時的にオフスクリーンで測定
  const orig = section.getAttribute('style') || '';
  section.style.cssText = 'display:block;position:fixed;left:-99999px;top:0;width:190mm;visibility:hidden;';
  const sectionPx = section.scrollHeight;
  section.setAttribute('style', orig);

  if (!sectionPx) return;

  // A4 使用可能高さ: 277mm を 96dpi 換算（1mm ≈ 3.7795px）
  const MM_TO_PX  = 96 / 25.4;
  const A4_H_PX   = Math.round(277 * MM_TO_PX); // ≈ 1047px
  const MAP_MIN   = Math.round(40  * MM_TO_PX); // 最低地図高さ 40mm ≈ 151px
  const OVERHEAD  = Math.round(26  * MM_TO_PX); // 見出し・余白 26mm ≈  98px

  const totalMin = sectionPx + MAP_MIN + OVERHEAD;

  if (totalMin > A4_H_PX) {
    const scale = A4_H_PX / totalMin;
    const el = document.getElementById('card-result');
    el.style.transform       = `scale(${scale.toFixed(4)})`;
    el.style.transformOrigin = 'top left';
    // スケール縮小分だけ幅を広げて右端の空白を埋める
    el.style.width           = `${(100 / scale).toFixed(2)}%`;
  }
}

function onAfterPrint() {
  const el = document.getElementById('card-result');
  if (!el) return;
  el.style.transform       = '';
  el.style.transformOrigin = '';
  el.style.width           = '';
}
